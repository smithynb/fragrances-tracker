<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Petals — 8, every 45° -->
  <ellipse cx="50" cy="22" rx="9" ry="16" fill="#1e52d0" transform="rotate(0,50,50)"/>
  <ellipse cx="50" cy="22" rx="9" ry="16" fill="#1e52d0" transform="rotate(45,50,50)"/>
  <ellipse cx="50" cy="22" rx="9" ry="16" fill="#1e52d0" transform="rotate(90,50,50)"/>
  <ellipse cx="50" cy="22" rx="9" ry="16" fill="#1e52d0" transform="rotate(135,50,50)"/>
  <ellipse cx="50" cy="22" rx="9" ry="16" fill="#1e52d0" transform="rotate(180,50,50)"/>
  <ellipse cx="50" cy="22" rx="9" ry="16" fill="#1e52d0" transform="rotate(225,50,50)"/>
  <ellipse cx="50" cy="22" rx="9" ry="16" fill="#1e52d0" transform="rotate(270,50,50)"/>
  <ellipse cx="50" cy="22" rx="9" ry="16" fill="#1e52d0" transform="rotate(315,50,50)"/>

  <!-- Centre -->
  <circle cx="50" cy="50" r="16" fill="#0e30a0"/>
  <circle cx="50" cy="50" r="9"  fill="#2458d8"/>
  <circle cx="50" cy="50" r="4"  fill="#4878e8"/>

</svg>
