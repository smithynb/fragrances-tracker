<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">



  <!-- Outer petals — 8, every 45°, deep blue -->
  <ellipse cx="50" cy="16" rx="11" ry="18" fill="#1238b0" transform="rotate(0,50,50)"/>
  <ellipse cx="50" cy="16" rx="11" ry="18" fill="#1238b0" transform="rotate(45,50,50)"/>
  <ellipse cx="50" cy="16" rx="11" ry="18" fill="#1238b0" transform="rotate(90,50,50)"/>
  <ellipse cx="50" cy="16" rx="11" ry="18" fill="#1238b0" transform="rotate(135,50,50)"/>
  <ellipse cx="50" cy="16" rx="11" ry="18" fill="#1238b0" transform="rotate(180,50,50)"/>
  <ellipse cx="50" cy="16" rx="11" ry="18" fill="#1238b0" transform="rotate(225,50,50)"/>
  <ellipse cx="50" cy="16" rx="11" ry="18" fill="#1238b0" transform="rotate(270,50,50)"/>
  <ellipse cx="50" cy="16" rx="11" ry="18" fill="#1238b0" transform="rotate(315,50,50)"/>

  <!-- Inner petals — 8, offset 22.5°, slightly brighter and closer to center -->
  <ellipse cx="50" cy="25" rx="8" ry="13" fill="#1e52d0" transform="rotate(22.5,50,50)"/>
  <ellipse cx="50" cy="25" rx="8" ry="13" fill="#1e52d0" transform="rotate(67.5,50,50)"/>
  <ellipse cx="50" cy="25" rx="8" ry="13" fill="#1e52d0" transform="rotate(112.5,50,50)"/>
  <ellipse cx="50" cy="25" rx="8" ry="13" fill="#1e52d0" transform="rotate(157.5,50,50)"/>
  <ellipse cx="50" cy="25" rx="8" ry="13" fill="#1e52d0" transform="rotate(202.5,50,50)"/>
  <ellipse cx="50" cy="25" rx="8" ry="13" fill="#1e52d0" transform="rotate(247.5,50,50)"/>
  <ellipse cx="50" cy="25" rx="8" ry="13" fill="#1e52d0" transform="rotate(292.5,50,50)"/>
  <ellipse cx="50" cy="25" rx="8" ry="13" fill="#1e52d0" transform="rotate(337.5,50,50)"/>

  <!-- Centre — 3 stacked circles, getting brighter toward the middle -->
  <circle cx="50" cy="50" r="16" fill="#0e30a0"/>
  <circle cx="50" cy="50" r="9"  fill="#2458d8"/>
  <circle cx="50" cy="50" r="4"  fill="#4878e8"/>

</svg>
